<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪明仕｜個人履歷</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
}

body {
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* 主卡片 */
.resume {
    width: 900px;
    background: white;
    border-radius: 15px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Header */
.header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

/* 照片 */
.profile-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #4e73df;
}

/* 名字 */
.header-text h1 {
    font-size: 32px;
}

.header-text p {
    color: #666;
}

/* 區塊 */
.section {
    margin-bottom: 25px;
}

.section h2 {
    color: #4e73df;
    border-bottom: 2px solid #4e73df;
    display: inline-block;
    margin-bottom: 10px;
}

.info-list {
    list-style: none;
}

.info-list li {
    margin: 6px 0;
}

/* 技能條 */
.bar {
    height: 10px;
    background: #ddd;
    border-radius: 5px;
    margin-bottom: 10px;
}

.bar div {
    height: 100%;
    width: 0;
    background: #1cc88a;
    border-radius: 5px;
    transition: 1.5s;
}

/* 按鈕 */
.btn {
    margin-top: 20px;
    background: #4e73df;
    color: white;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #2e59d9;
}

footer {
    text-align: center;
    margin-top: 20px;
    color: gray;
}
</style>
</head>

<body>

<div class="resume">

    <!-- Header（照片） -->
    <div class="header">
        <img src="images/photo.jfif" class="profile-img">
        <div class="header-text">
            <h1>洪明仕</h1>
            <p>亞洲大學 學生</p>
        </div>
    </div>

    <!-- 個人資料 -->
    <div class="section">
        <h2>個人資料</h2>
        <ul class="info-list">
            <li>🎂 2003/12/21</li>
            <li>📧 example@email.com</li>
            <li>📱 0912-345-678</li>
        </ul>
    </div>

    <!-- 自我介紹 -->
    <div class="section">
        <h2>自我介紹</h2>
        <p>我是一位熱愛學習與挑戰的新世代學生，對前端開發與科技應用充滿熱情。</p>
    </div>

    <!-- 技能 -->
    <div class="section">
        <h2>技能專長</h2>

        <p>HTML</p>
        <div class="bar"><div data-width="85%"></div></div>

        <p>CSS</p>
        <div class="bar"><div data-width="80%"></div></div>

        <p>JavaScript</p>
        <div class="bar"><div data-width="70%"></div></div>
    </div>

    <!-- 經歷 -->
    <div class="section">
        <h2>經歷</h2>
        <ul class="info-list">
            <li>✔ 校內專題</li>
            <li>✔ 網頁設計練習</li>
            <li>✔ 團隊合作專案</li>
        </ul>
    </div>

    <!-- 按鈕 -->
    <div class="btn" onclick="downloadPDF()">下載PDF</div>

    <footer>© 2026 洪明仕</footer>

</div>

<script>
// 技能動畫
window.onload = () => {
    document.querySelectorAll(".bar div").forEach(el => {
        el.style.width = el.dataset.width;
    });
};

// 下載
function downloadPDF() {
    alert("請按 Ctrl + P → 另存為 PDF");
    window.print();
}
</script>

</body>
</html>
