<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪明仕｜個人履歷</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
}

body {
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* 主版面：左右切 */
.resume {
    width: 1000px;
    display: grid;
    grid-template-columns: 300px 1fr;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

/* 左側 */
.header {
    grid-column: 1;
    grid-row: 1 / span 10;
    background: linear-gradient(180deg, #4e73df, #1cc88a);
    color: white;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
}

/* 照片 */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 15px;
    border: 4px solid white;
}

/* 名字 */
.header-text h1 {
    font-size: 24px;
    margin-bottom: 5px;
}

.header-text p {
    font-size: 14px;
    opacity: 0.9;
}

/* 右側內容 */
.section {
    padding: 20px 30px;
    border-bottom: 1px solid #eee;
}

/* 標題 */
.section h2 {
    color: #4e73df;
    margin-bottom: 10px;
}

/* 個資 */
.info-list li {
    margin: 6px 0;
}

/* 技能條 */
.bar {
    height: 8px;
    background: #eee;
    border-radius: 5px;
    margin-bottom: 10px;
}

.bar div {
    height: 100%;
    width: 0;
    background: #4e73df;
    border-radius: 5px;
    transition: 1.5s;
}

/* 按鈕 */
.btn {
    margin: 20px 30px;
    background: #4e73df;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #2e59d9;
}

/* footer */
footer {
    grid-column: 1 / span 2;
    text-align: center;
    padding: 15px;
    background: #f1f1f1;
}
</style>
</head>

<body>

<div class="resume">

    <!-- Header（照片） -->
    <div class="header">
        <img src="images/photo.jfif" class="profile-img">
        <div class="header-text">
            <h1>洪明仕</h1>
            <p>亞洲大學 學生</p>
        </div>
    </div>


    <!-- 個人資料 -->
    <div class="section">
        <h2>個人資料</h2>
        <ul class="info-list">
            <li>🎂 2003/12/21</li>
            <li>📧 example@email.com</li>
            <li>📱 0912-345-678</li>
        </ul>
    </div>

    <!-- 自我介紹 -->
    <div class="section">
        <h2>自我介紹</h2>
        <p>我是一位熱愛學習與挑戰的新世代學生，對前端開發與科技應用充滿熱情。</p>
    </div>

    <!-- 技能 -->
    <div class="section">
        <h2>技能專長</h2>

        <p>HTML</p>
        <div class="bar"><div data-width="85%"></div></div>

        <p>CSS</p>
        <div class="bar"><div data-width="80%"></div></div>

        <p>JavaScript</p>
        <div class="bar"><div data-width="70%"></div></div>
    </div>

    <!-- 經歷 -->
    <div class="section">
        <h2>經歷</h2>
        <ul class="info-list">
            <li>✔ 校內專題</li>
            <li>✔ 網頁設計練習</li>
            <li>✔ 團隊合作專案</li>
        </ul>
    </div>

    <!-- 按鈕 -->
    <div class="btn" onclick="downloadPDF()">下載PDF</div>

    <footer>© 2026 洪明仕</footer>

</div>

<script>
// 技能動畫
window.onload = () => {
    document.querySelectorAll(".bar div").forEach(el => {
        el.style.width = el.dataset.width;
    });
};

// 下載
function downloadPDF() {
    alert("請按 Ctrl + P → 另存為 PDF");
    window.print();
}
</script>
<audio id="bgm" autoplay loop playsinline>
  <source src="mp3/網頁背景主題曲.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>
</body>
</html>
