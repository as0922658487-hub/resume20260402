<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洪明仕｜個人履歷</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
}

body {
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    padding: 40px;
    display: flex;
    justify-content: center;
}

.resume {
    background: white;
    width: 900px;
    border-radius: 15px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🔥 Header 升級 */
.header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

/* 照片 */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #4e73df;
}

/* 名字區 */
.header-text h1 {
    font-size: 30px;
    color: #333;
}

.header-text p {
    color: #666;
}

/* 區塊 */
.section {
    margin-bottom: 25px;
}

.section h2 {
    font-size: 20px;
    color: #4e73df;
    margin-bottom: 10px;
    border-bottom: 2px solid #4e73df;
    display: inline-block;
    padding-bottom: 5px;
}

.info-list {
    list-style: none;
    margin-top: 10px;
}

.info-list li {
    margin-bottom: 8px;
    color: #444;
}

/* 技能條 */
.skill-bar {
    margin-bottom: 12px;
}

.skill-bar span {
    display: block;
    margin-bottom: 5px;
}

.bar {
    height: 10px;
    background: #ddd;
    border-radius: 5px;
    overflow: hidden;
}

.bar div {
    height: 100%;
    width: 0;
    background: #1cc88a;
    border-radius: 5px;
    transition: width 1.5s ease;
}

/* 按鈕 */
.btn {
    display: block;
    width: 200px;
    margin: 30px auto 0;
    padding: 10px;
    text-align: center;
    background: #4e73df;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #2e59d9;
}

footer {
    text-align: center;
    margin-top: 30px;
    color: #888;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="resume">

    <!-- 🔥 Header（含照片） -->
    <div class="header">
        <img src="images/profile.png" class="profile-img" alt="個人照片">

        <div class="header-text">
            <h1>洪明仕</h1>
            <p>亞洲大學 學生｜學號 AU114001001</p>
        </div>
    </div>

    <div class="section">
        <h2>個人資料</h2>
        <ul class="info-list">
            <li>📍 亞洲大學</li>
            <li>🎂 2003/12/21</li>
            <li>📧 example@email.com</li>
            <li>📱 0912-345-678</li>
        </ul>
    </div>

    <div class="section">
        <h2>自我介紹</h2>
        <p>
            我是一名積極進取的學生，喜歡學習新技術，
            對前端開發與系統設計充滿熱情，具備良好團隊合作能力。
        </p>
    </div>

    <div class="section">
        <h2>技能專長</h2>

        <div class="skill-bar">
            <span>HTML</span>
            <div class="bar"><div data-width="85%"></div></div>
        </div>

        <div class="skill-bar">
            <span>CSS</span>
            <div class="bar"><div data-width="80%"></div></div>
        </div>

        <div class="skill-bar">
            <span>JavaScript</span>
            <div class="bar"><div data-width="70%"></div></div>
        </div>

        <div class="skill-bar">
            <span>團隊合作</span>
            <div class="bar"><div data-width="90%"></div></div>
        </div>
    </div>

    <div class="section">
        <h2>經歷</h2>
        <ul class="info-list">
            <li>✔ 校內專題製作</li>
            <li>✔ 社團活動參與</li>
            <li>✔ 前端作品開發</li>
        </ul>
    </div>

    <div class="btn" onclick="downloadResume()">下載履歷PDF</div>

    <footer>
        © 2026 洪明仕
    </footer>
</div>

<script>
// 技能動畫
window.onload = function() {
    const bars = document.querySelectorAll(".bar div");
    bars.forEach(bar => {
        bar.style.width = bar.getAttribute("data-width");
    });
};

// 下載功能
function downloadResume() {
    alert("請使用 Ctrl + P → 另存為 PDF");
    window.print();
}
</script>

</body>
</html>
